# A generic, single database configuration.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts, relative to this file.
script_location = %(here)s/alembic

# Prepend the project root to sys.path so env.py can import application modules.
prepend_sys_path = .
path_separator = os

# Template used when generating a new migration file.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file as well as
# the filename.  If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements.
# timezone =

# Truncate the number of characters in the slug field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory.
# sourceless = false

# Version location specification; This defaults to alembic/versions.
# When using multiple version directories, initial revisions must be specified
# with --version-path.
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# The output encoding used when revision files are written from script.py.mako.
# output_encoding = utf-8

# ---------------------------------------------------------------------------
# Default SQLAlchemy URL (SQLite, for local development and CLI use).
#
# Override for other providers:
#   1. Edit this value, or
#   2. Set CONFIGFORGE_DB_URL environment variable, or
#   3. Pass --url flag: alembic --url "postgresql+psycopg2://..." upgrade head
#
# The application itself always injects the URL programmatically through
# core.migrations.runner — this value is only used when running Alembic
# from the CLI without a config file override.
# ---------------------------------------------------------------------------
sqlalchemy.url = sqlite:///db/configforge.db


[post_write_hooks]
# Post-write hooks define scripts or Python functions that are run on
# newly generated revision scripts.  See the documentation for further
# detail and examples.

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
