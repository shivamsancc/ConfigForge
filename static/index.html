<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConfigForge</title>
<link rel="stylesheet" href="styles.css">
<script>
  // Applied before first paint to avoid a flash of the wrong theme.
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      } else {
        var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.setAttribute('data-theme', prefersLight ? 'light' : 'dark');
      }
    } catch (e) { /* localStorage unavailable -- default dark applies via CSS */ }
  })();
</script>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand">
      <span id="brand-mark" class="brand-mark"></span>
      <span class="brand-name">Config<span class="accent-word">Forge</span></span>
    </div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <span>v1.0</span>
      <a href="https://github.com/shivamsancc/ConfigForge" target="_blank" rel="noopener">GitHub &#8599;</a>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title"></div>
      </div>
      <div class="flex items-center gap-12">
        <div class="topbar-stats" id="topbar-stats"></div>
        <button class="btn btn-icon btn-ghost" id="btn-theme-toggle" title="Toggle dark/light mode"></button>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="toast-stack"></div>

<!-- Vendored locally, no CDN -- must run fully offline -->
<script src="xlsx.full.min.js"></script>

<script src="ui.js"></script>
<script src="api.js"></script>
<script src="tagfields.js"></script>
<script src="tablecontrols.js"></script>
<script src="devices.js"></script>
<script src="bandwidth.js"></script>
<script src="subnets.js"></script>
<script src="tags.js"></script>
<script src="lists.js"></script>
<script src="generate.js"></script>
<script src="history.js"></script>
<script src="audit.js"></script>
<script src="dashboard.js"></script>
<script src="networktree.js"></script>
<script src="app.js"></script>
</body>
</html>
